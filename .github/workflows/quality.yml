# SPDX-License-Identifier: AGPL-3.0-or-later
# Quality checks: TruffleHog secret scanning and EditorConfig enforcement.

name: Quality

on:
  push:
  pull_request:

permissions: read-all

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@bff3d2670b362bbb4a0bcdeffea146cbc2ad3abd
        with:
          path: ./
          # On a push the default branch head IS the new commit, so
          # trufflehog refuses with "BASE and HEAD commits are the same".
          # Use the previous commit (event.before) for pushes.
          base: ${{ github.event.before || github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  editorconfig:
    name: EditorConfig Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: EditorConfig check
        uses: editorconfig-checker/action-editorconfig-checker@4054fa83a075fdf090bd098bdb1c09aaf64a4169
