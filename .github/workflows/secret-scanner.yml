# SPDX-License-Identifier: AGPL-3.0-or-later
# Dedicated secret scanner — thorough TruffleHog scan with --only-verified
# across the full git history. Separate from quality.yml for clearer reporting.

name: Secret Scanner

on:
  push:
  pull_request:

# Estate guardrail: cancel superseded runs so re-pushes / rebased PR
# updates do not pile up queued runs against the shared account-wide
# Actions concurrency pool. Applied only to read-only check workflows
# (no publish/mutation), so cancelling a superseded run is always safe.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  secret-scan:
    name: TruffleHog Full Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: TruffleHog verified secrets scan
        uses: trufflesecurity/trufflehog@bff3d2670b362bbb4a0bcdeffea146cbc2ad3abd
        with:
          path: ./
          # Use previous commit (event.before) for pushes to avoid
          # "BASE and HEAD are the same" refusal.
          base: ${{ github.event.before || github.event.repository.default_branch }}
          head: HEAD
          # NOTE: --fail is added by the action itself; don't repeat it in
          # extra_args or trufflehog errors out with "flag 'fail' cannot be
          # repeated, try --help".
          extra_args: --only-verified
