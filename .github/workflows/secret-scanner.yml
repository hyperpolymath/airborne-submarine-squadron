# SPDX-License-Identifier: AGPL-3.0-or-later
# Dedicated secret scanner — thorough TruffleHog scan with --only-verified
# across the full git history. Separate from quality.yml for clearer reporting.

name: Secret Scanner

on:
  push:
  pull_request:

permissions: read-all

jobs:
  secret-scan:
    name: TruffleHog Full Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: TruffleHog verified secrets scan
        uses: trufflesecurity/trufflehog@7ee2e0fdffec27d19ccbb8fb3dcf8a83b9d7f9e8
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified --fail
