# SPDX-License-Identifier: AGPL-3.0-or-later
# npm/bun blocker — fails if npm or bun lockfiles are committed.
# This repo uses Deno; npm and bun are banned per RSR policy.

name: npm/bun Blocker

on:
  push:
  pull_request:

permissions: read-all

jobs:
  block-npm-bun:
    name: Block npm and bun Lockfiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Check for banned lockfiles
        run: |
          FAIL=0

          if [ -f "package-lock.json" ]; then
            echo "BANNED: package-lock.json found — use Deno, not npm"
            FAIL=$((FAIL + 1))
          fi

          if [ -f "bun.lockb" ]; then
            echo "BANNED: bun.lockb found — use Deno, not bun"
            FAIL=$((FAIL + 1))
          fi

          if [ -f "yarn.lock" ]; then
            echo "BANNED: yarn.lock found — use Deno, not yarn"
            FAIL=$((FAIL + 1))
          fi

          if [ -f "pnpm-lock.yaml" ]; then
            echo "BANNED: pnpm-lock.yaml found — use Deno, not pnpm"
            FAIL=$((FAIL + 1))
          fi

          if [ "$FAIL" -gt 0 ]; then
            echo ""
            echo "ERROR: Banned package manager lockfile(s) detected."
            echo "This project uses Deno. Remove these files."
            exit 1
          fi

          echo "No banned lockfiles found."
